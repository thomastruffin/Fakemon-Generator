<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fakemon Generator</title>
    <link rel="stylesheet" href="styles/main.css">
    <script src="./script/main.js" type="module" defer/></script>
</head>
<body>
    <div id="app">
        <header class="header">
            <div class="container">
                <h1 class="logo">Fakemon Generator</h1>
                <p class="subtitle">Create unique Pokémon concepts</p>
            </div>
        </header>

        <main class="main-content">
            <div class="button_box">
                <span>Generate a random species</span> 
                <button id="genrateRandomSpecies" name="genrateRandomSpecies">generate</button>
                <p><b>species:</b> <span id="fakemon_species"></span></p>
            </div>
              <div class="button_box">
                <span>Generate a random species</span> 
                <button id="generateType" name="generateType">generate</button>
              </div>
              <p><b>type:</b> <span id="fakemon_type_1"></span> <span id="fakemon_type_2"></span></p>
                <p><b>species:</b> <span id="fakemon_species"></span></p>
        </main>
    </div>
</body>
</html>
